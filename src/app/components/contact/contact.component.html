<section id="contact" class="py-16 px-6 bg-indigo-600 text-white">
  <h2 class="text-3xl font-bold text-center mb-8">Get In Touch</h2>
  <form class="max-w-xl mx-auto bg-white text-gray-800 p-8 rounded-xl shadow space-y-4" (submit)="$event.preventDefault()">
    <input type="text" placeholder="Your Name" class="w-full p-3 border rounded-lg">
    <input type="email" placeholder="Your Email" class="w-full p-3 border rounded-lg">
    <textarea placeholder="Your Message" rows="5" class="w-full p-3 border rounded-lg"></textarea>
    <button class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700">Send Message</button>
  </form>
</section>
